name: Update BTC data

on:
  schedule:
    - cron: "20 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-btc-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update BTC-USD data
        run: npm run update:data

      - name: Commit updated data
        run: |
          if git diff --quiet -- src/data/btc-usd.js; then
            echo "BTC-USD data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/btc-usd.js
          git commit -m "Update BTC-USD data"
          git push
