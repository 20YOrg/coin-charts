<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Charts</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/tool-menu.css">
    <link rel="stylesheet" href="css/modal.css">
</head>

<body>
    <div id="controls">
        <div class="symbol-block" aria-label="Current symbol">
            <span class="symbol-name">BTCUSD</span>
            <span class="symbol-meta">Bitcoin / U.S. Dollar</span>
        </div>
        <div class="toolbar-divider"></div>
        <div class="control-row control-chip interval-control">
            <label for="interval-select" class="control-title">Interval</label>
            <select id="interval-select">
                <option value="1D">1D</option>
                <option value="3D">3D</option>
                <option value="1W">1W</option>
                <option value="1M">1M</option>
                <option value="3M">3M</option>
                <option value="6M">6M</option>
            </select>
            <span class="inline-divider"></span>
            <label for="custom-interval-value" class="custom-label">Custom</label>
            <input id="custom-interval-value" type="number" min="1" max="999" value="9">
            <select id="custom-interval-unit">
                <option value="D">days</option>
                <option value="W">weeks</option>
                <option value="M">months</option>
            </select>
            <button id="custom-interval-apply" type="button">Set</button>
        </div>
        <div class="control-row control-chip">
            <label for="scale-select">Scale</label>
            <select id="scale-select">
                <option value="linear">Linear</option>
                <option value="logarithmic">Logarithmic</option>
            </select>
        </div>
    </div>
    <div id="chart-container">
        <canvas id="chart"></canvas>
        <div id="tool-menu">
            <button id="tool-crosshair" title="Toggle Crosshair" aria-label="Toggle Crosshair">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M9 2v14M2 9h14" />
                </svg>
            </button>
            <button id="tool-ma" title="Configure Moving Average" aria-label="Configure Moving Average">
                <span class="tool-text">MA</span>
            </button>
            <button id="tool-line" title="Draw Finite Line">
                <svg width="20" height="20" viewBox="0 0 20 20">
                    <line x1="5" y1="15" x2="15" y2="5" />
                    <circle cx="5" cy="15" r="2" />
                    <circle cx="15" cy="5" r="2" />
                </svg>
            </button>
            <button id="tool-infinite-line" title="Draw Infinite Line" aria-label="Draw Infinite Line">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M3 15 15 3" />
                    <path d="M10 3h5v5" />
                    <path d="M8 15H3v-5" />
                </svg>
            </button>
            <button id="tool-horizontal-line" title="Horizontal Line" aria-label="Horizontal Line">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M3 9h12" />
                    <circle cx="9" cy="9" r="2" />
                </svg>
            </button>
            <button id="tool-vertical-line" title="Vertical Line" aria-label="Vertical Line">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M9 3v12" />
                    <circle cx="9" cy="9" r="2" />
                </svg>
            </button>
            <button id="tool-fibonacci" title="Draw Fibonacci Levels" aria-label="Draw Fibonacci Levels">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M4 4h10" />
                    <path d="M4 7h8" />
                    <path d="M4 10h10" />
                    <path d="M4 13h6" />
                    <path d="M4 3v12" />
                </svg>
            </button>
            <button id="tool-measure" title="Measure" aria-label="Measure">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M3 12.5 12.5 3 15 5.5 5.5 15 3 12.5z" />
                    <path d="M5.2 10.3 6.8 11.9" />
                    <path d="M7.1 8.4 9.3 10.6" />
                    <path d="M9 6.5 10.6 8.1" />
                    <path d="M10.9 4.6 13.1 6.8" />
                </svg>
            </button>
            <button id="tool-reset" title="Reset View" aria-label="Reset View">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M14.5 6.5A6 6 0 1 0 15 9" />
                    <path d="M14.5 2.5v4h-4" />
                </svg>
            </button>
            <button id="tool-undo" title="Undo drawing change" aria-label="Undo drawing change" disabled>
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M7 5 3.5 8.5 7 12" />
                    <path d="M4 8.5h6.5a4 4 0 1 1 0 8H9" />
                </svg>
            </button>
        </div>
        <div id="line-toolbar" hidden>
            <div class="toolbar-color color-control" title="Line color">
                <button id="line-color-button" class="color-button" type="button" aria-label="Line color">
                    <svg width="17" height="17" viewBox="0 0 17 17" aria-hidden="true">
                        <path d="M3.2 12.4 4 15l2.6-.8 7.6-7.6-3.4-3.4-7.6 7.6z" />
                        <path d="M9.9 4.1 13.1 7.3" />
                        <path d="M3.2 12.4 6.6 14.2" />
                    </svg>
                    <span id="line-color-swatch" class="toolbar-swatch"></span>
                </button>
                <input id="line-color" type="hidden" value="#2962ff">
                <div id="line-color-menu" class="color-menu" hidden></div>
            </div>
            <div class="style-control" title="Line style">
                <button id="line-style-button" class="style-button" type="button" aria-label="Line style" data-style="solid">
                    <span class="style-preview" aria-hidden="true"></span>
                </button>
                <div id="line-style-menu" class="style-menu" hidden>
                    <button type="button" data-style="solid">
                        <span class="style-preview" aria-hidden="true"></span>
                        <span>Line</span>
                    </button>
                    <button type="button" data-style="dashed">
                        <span class="style-preview" aria-hidden="true"></span>
                        <span>Dashed line</span>
                    </button>
                    <button type="button" data-style="dotted">
                        <span class="style-preview" aria-hidden="true"></span>
                        <span>Dotted line</span>
                    </button>
                </div>
            </div>
            <div class="choice-control" title="Line width">
                <button id="line-width-button" class="choice-button width-button" type="button" aria-label="Line width">
                    <span id="line-width-label">2px</span>
                </button>
                <div id="line-width-menu" class="choice-menu" hidden>
                    <button type="button" data-value="1">
                        <span>1px</span>
                    </button>
                    <button type="button" data-value="2">
                        <span>2px</span>
                    </button>
                    <button type="button" data-value="3">
                        <span>3px</span>
                    </button>
                    <button type="button" data-value="4">
                        <span>4px</span>
                    </button>
                </div>
            </div>
            <div class="line-toolbar-divider" aria-hidden="true"></div>
            <div class="toolbar-color color-control" title="Text color">
                <button id="line-text-color-button" class="color-button" type="button" aria-label="Text color">
                    <span class="text-color-icon" aria-hidden="true">T</span>
                    <span id="line-text-color-swatch" class="toolbar-swatch"></span>
                </button>
                <input id="line-text-color" type="hidden" value="#131722">
                <div id="line-text-color-menu" class="color-menu" hidden></div>
            </div>
            <div class="choice-control" title="Text size">
                <button id="line-text-size-button" class="choice-button text-size-button" type="button" aria-label="Text size">
                    <span class="text-size-icon" aria-hidden="true">T</span>
                    <span id="line-text-size-label">12</span>
                </button>
                <div id="line-text-size-menu" class="choice-menu" hidden>
                    <button type="button" data-value="10"><span>10</span></button>
                    <button type="button" data-value="12"><span>12</span></button>
                    <button type="button" data-value="14"><span>14</span></button>
                    <button type="button" data-value="16"><span>16</span></button>
                    <button type="button" data-value="18"><span>18</span></button>
                    <button type="button" data-value="22"><span>22</span></button>
                </div>
            </div>
            <button id="line-text-bold" type="button" title="Bold text" aria-label="Bold text">
                <span class="bold-icon">B</span>
            </button>
            <div class="line-toolbar-divider" aria-hidden="true"></div>
            <div class="more-control mobile-only-tool">
                <button id="line-more-button" type="button" title="More line actions" aria-label="More line actions">
                    <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                        <circle cx="4" cy="9" r="1.1" />
                        <circle cx="9" cy="9" r="1.1" />
                        <circle cx="14" cy="9" r="1.1" />
                    </svg>
                </button>
                <div id="line-more-menu" class="more-menu" hidden>
                    <button id="line-more-copy" type="button">
                        <span>Copy</span>
                    </button>
                    <button id="line-more-cut" type="button">
                        <span>Cut</span>
                    </button>
                    <button id="line-more-paste" type="button" disabled>
                        <span>Paste</span>
                    </button>
                    <button id="line-more-lock" type="button">
                        <span>Lock</span>
                    </button>
                    <button id="line-more-delete" type="button">
                        <span>Delete</span>
                    </button>
                </div>
            </div>
            <button id="line-copy" class="mobile-only-tool" type="button" title="Copy line" aria-label="Copy line">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <rect x="6" y="5" width="8" height="10" rx="1.5" />
                    <path d="M4 12V4.5A1.5 1.5 0 0 1 5.5 3H11" />
                </svg>
            </button>
            <button id="line-paste" class="mobile-only-tool" type="button" title="Paste line" aria-label="Paste line" disabled>
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M6 4.5h6" />
                    <path d="M7 3h4l1 2H6l1-2z" />
                    <rect x="4.5" y="5.5" width="9" height="9.5" rx="1.5" />
                    <path d="M7 9h4" />
                    <path d="M7 12h3" />
                </svg>
            </button>
            <button id="line-lock" type="button" title="Lock line" aria-label="Lock line">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <rect x="4" y="8" width="10" height="7" rx="1.5" />
                    <path d="M6 8V6a3 3 0 0 1 6 0v2" />
                </svg>
            </button>
            <button id="line-delete" type="button" title="Delete line" aria-label="Delete line">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                    <path d="M3 5h12" />
                    <path d="M7 5V3h4v2" />
                    <path d="M5 5l1 10h6l1-10" />
                </svg>
            </button>
        </div>
        <input id="line-text-editor" type="text" maxlength="48" autocomplete="off" spellcheck="false" hidden>
    </div>
    <div id="range-bar">
        <div class="range-selector" aria-label="Visible range">
            <button class="range-button active" type="button" data-range="1D">1D</button>
            <button class="range-button" type="button" data-range="5D">5D</button>
            <button class="range-button" type="button" data-range="1M">1M</button>
            <button class="range-button" type="button" data-range="3M">3M</button>
            <button class="range-button" type="button" data-range="6M">6M</button>
            <button class="range-button" type="button" data-range="YTD">YTD</button>
            <button class="range-button" type="button" data-range="1Y">1Y</button>
            <button class="range-button" type="button" data-range="5Y">5Y</button>
            <button class="range-button" type="button" data-range="ALL">All</button>
        </div>
        <div id="range-status" aria-live="polite"></div>
        <button id="theme-toggle" type="button" class="theme-toggle" aria-label="Switch to dark theme" aria-pressed="false">
            <svg class="theme-icon theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
            </svg>
            <svg class="theme-icon theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12.79A8.5 8.5 0 1 1 11.21 3 6.5 6.5 0 0 0 21 12.79Z"></path>
            </svg>
        </button>
    </div>
    <div id="modal-overlay"></div>
    <div id="ma-modal">
        <div class="modal-header">
            <h3>Moving Averages</h3>
        </div>
        <div class="ma-list">
            <div class="ma-config">
                <label class="ma-enabled">
                    <input type="checkbox" id="ma1-enabled" checked>
                    <span></span>
                </label>
                <div class="ma-name">MA 1</div>
                <label class="ma-field">
                    <span>Length</span>
                    <input type="number" id="ma1-period" value="5" min="1" placeholder="Period">
                </label>
                <label class="ma-color">
                    <span>Color</span>
                    <input type="color" id="ma1-color" value="#0000FF">
                </label>
            </div>
            <div class="ma-config">
                <label class="ma-enabled">
                    <input type="checkbox" id="ma2-enabled">
                    <span></span>
                </label>
                <div class="ma-name">MA 2</div>
                <label class="ma-field">
                    <span>Length</span>
                    <input type="number" id="ma2-period" value="10" min="1" placeholder="Period">
                </label>
                <label class="ma-color">
                    <span>Color</span>
                    <input type="color" id="ma2-color" value="#FF0000">
                </label>
            </div>
            <div class="ma-config">
                <label class="ma-enabled">
                    <input type="checkbox" id="ma3-enabled">
                    <span></span>
                </label>
                <div class="ma-name">MA 3</div>
                <label class="ma-field">
                    <span>Length</span>
                    <input type="number" id="ma3-period" value="20" min="1" placeholder="Period">
                </label>
                <label class="ma-color">
                    <span>Color</span>
                    <input type="color" id="ma3-color" value="#00FF00">
                </label>
            </div>
        </div>
        <div class="modal-buttons">
            <button class="cancel-btn">Cancel</button>
            <button class="save-btn">Save</button>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>

</html>
